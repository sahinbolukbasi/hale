<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap');

    :root {
      --bg-1: #f4f8ff;
      --bg-2: #ffeaf3;
      --bg-3: #fff8ef;
      --cake-1: #ffd9e7;
      --cake-2: #ffbfd8;
      --cake-3: #f3a8c7;
      --cream-1: #fffdf7;
      --cream-2: #fff3dc;
      --text: #6b4e63;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.9), transparent 40%),
        radial-gradient(circle at 85% 10%, rgba(255, 255, 255, 0.7), transparent 35%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 50%, var(--bg-3));
      display: grid;
      place-items: center;
      overflow-x: hidden;
      padding: 1.2rem;
      position: relative;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .falling-elements {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      transition: opacity 0.8s ease;
      overflow: hidden;
    }

    .falling-heart,
    .falling-confetti {
      position: absolute;
      top: -10vh;
      opacity: 0;
      animation: confettiFall linear forwards;
    }

    .falling-heart {
      color: #ff7bac;
      font-size: 1.2rem;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
    }

    .falling-confetti {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    .confetti-1 { background: #ffd166; }
    .confetti-2 { background: #ff8fab; }
    .confetti-3 { background: #9ad7ff; }
    .confetti-4 { background: #c4f1be; }
    .confetti-5 { background: #f7c7ff; }

    .dot {
      position: absolute;
      top: -10vh;
      border-radius: 999px;
      animation: floatDown linear infinite;
      opacity: 0.8;
    }

    .d1 { left: 7%; width: 8px; height: 8px; background: #ffd0e4; animation-duration: 9s; animation-delay: -2s; }
    .d2 { left: 17%; width: 10px; height: 10px; background: #d3ecff; animation-duration: 11s; animation-delay: -5s; }
    .d3 { left: 27%; width: 7px; height: 7px; background: #ffe9c8; animation-duration: 8s; animation-delay: -1s; }
    .d4 { left: 39%; width: 9px; height: 9px; background: #f7d8ff; animation-duration: 12s; animation-delay: -4s; }
    .d5 { left: 52%; width: 6px; height: 6px; background: #d5f3ff; animation-duration: 10s; animation-delay: -8s; }
    .d6 { left: 64%; width: 11px; height: 11px; background: #ffd7ef; animation-duration: 13s; animation-delay: -6s; }
    .d7 { left: 75%; width: 8px; height: 8px; background: #e2efff; animation-duration: 9.5s; animation-delay: -3s; }
    .d8 { left: 88%; width: 7px; height: 7px; background: #ffe4d5; animation-duration: 10.5s; animation-delay: -7s; }

    .scene {
      position: relative;
      z-index: 2;
      width: min(560px, 100%);
      text-align: center;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: clamp(0.7rem, 1.8vw, 1.2rem);
      place-items: center;
      align-content: center;
      min-height: min(96vh, 860px);
      padding-block: clamp(0.35rem, 1.2vw, 0.9rem);
    }

    .title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.5rem, 7vw, 4.8rem);
      color: #845a78;
      text-shadow: 0 8px 20px rgba(143, 94, 125, 0.2);
    }

    .subtitle {
      font-size: clamp(0.9rem, 2.2vw, 1.05rem);
      color: rgba(107, 78, 99, 0.85);
      margin-top: -0.2rem;
      margin-bottom: 0.25rem;
    }

    .cake-wrap {
      position: relative;
      width: min(360px, 100%);
      height: 430px;
      display: grid;
      place-items: end center;
      perspective: 900px;
      margin-block: 0.95rem 0.45rem;
    }

    .cake-shadow {
      position: absolute;
      bottom: 18px;
      width: 280px;
      height: 34px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(98, 74, 98, 0.25), transparent 72%);
      filter: blur(6px);
      z-index: 1;
    }

    .cake {
      position: relative;
      width: 290px;
      height: 360px;
      animation: cakeBob 4.2s ease-in-out infinite;
      z-index: 2;
    }

    .plate {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 300px;
      height: 48px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, #ffffff, #ecf4ff 60%, #dfe9f8);
      box-shadow: 0 14px 22px rgba(96, 78, 104, 0.24), inset 0 -8px 10px rgba(155, 175, 201, 0.33);
    }

    .tier {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 12px 20px rgba(101, 83, 102, 0.18);
      background: linear-gradient(180deg, var(--cake-1), var(--cake-2) 56%, var(--cake-3));
    }

    .tier::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.34), transparent 40%, transparent 75%, rgba(197, 132, 167, 0.22));
    }

    .tier-bottom { width: 248px; height: 112px; bottom: 30px; }
    .tier-middle { width: 198px; height: 90px; bottom: 122px; }
    .tier-top { width: 154px; height: 72px; bottom: 196px; }

    .cream {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, var(--cream-1), var(--cream-2));
      box-shadow: inset 0 -4px 6px rgba(227, 190, 144, 0.4), 0 3px 5px rgba(166, 124, 136, 0.14);
      z-index: 4;
    }

    .cream-bottom { width: 252px; height: 24px; bottom: 123px; }
    .cream-middle { width: 202px; height: 22px; bottom: 195px; }
    .cream-top { width: 156px; height: 20px; bottom: 262px; }

    .drips {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      z-index: 5;
    }

    .drips span {
      width: 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, #fffef8, #f5dfbe);
      box-shadow: inset 0 -2px 4px rgba(224, 176, 130, 0.34);
    }

    .drips-bottom { bottom: 104px; }
    .drips-bottom span:nth-child(1) { height: 14px; }
    .drips-bottom span:nth-child(2) { height: 24px; }
    .drips-bottom span:nth-child(3) { height: 12px; }
    .drips-bottom span:nth-child(4) { height: 20px; }
    .drips-bottom span:nth-child(5) { height: 13px; }

    .drips-middle { bottom: 178px; }
    .drips-middle span:nth-child(1) { height: 12px; }
    .drips-middle span:nth-child(2) { height: 18px; }
    .drips-middle span:nth-child(3) { height: 10px; }
    .drips-middle span:nth-child(4) { height: 16px; }
    .drips-middle span:nth-child(5) { height: 11px; }

    .drips-top { bottom: 247px; }
    .drips-top span:nth-child(1) { height: 8px; }
    .drips-top span:nth-child(2) { height: 13px; }
    .drips-top span:nth-child(3) { height: 8px; }
    .drips-top span:nth-child(4) { height: 11px; }

    .candles {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 277px;
      display: flex;
      gap: 16px;
      z-index: 7;
    }

    .candle {
      width: 11px;
      height: 54px;
      border-radius: 999px;
      background: repeating-linear-gradient(to bottom, #ffe7f1 0 7px, #ffd0e3 7px 14px);
      box-shadow: 0 4px 7px rgba(110, 86, 112, 0.2);
      position: relative;
    }

    .flame {
      position: absolute;
      left: 50%;
      top: -27px;
      transform: translateX(-50%);
      width: 18px;
      height: 28px;
      border-radius: 58% 58% 45% 45%;
      background: radial-gradient(circle at 50% 35%, #fffef1 0%, #ffe8a3 32%, #ffc871 60%, #ff9252 100%);
      filter: drop-shadow(0 0 8px rgba(255, 189, 88, 0.7));
      animation: flameFlicker 0.52s ease-in-out infinite alternate;
      transform-origin: center bottom;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    .flame.blown-out {
      opacity: 0;
      transform: translateX(-50%) scale(0.25);
    }

    .smoke {
      position: absolute;
      left: 50%;
      top: -8px;
      width: 5px;
      height: 22px;
      border-radius: 50%;
      background: rgba(230, 230, 230, 0.68);
      transform: translateX(-50%);
      animation: smokeRise 1.7s ease-out forwards;
    }

    .controls {
      display: grid;
      place-items: center;
      gap: 0.55rem;
      margin-top: 1.15rem;
      padding: 0.9rem 1rem 1rem;
      width: min(340px, 94%);
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 18px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 28px rgba(128, 95, 126, 0.18);
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
    }

    .icon-btn {
      width: 58px;
      height: 58px;
      border: none;
      border-radius: 999px;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      display: inline-grid;
      place-items: center;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .icon-btn:hover {
      transform: translateY(-2px);
    }

    .mic-btn {
      background: linear-gradient(135deg, #ff9a5a, #ff5f5d);
      box-shadow: 0 10px 24px rgba(255, 89, 89, 0.34);
    }

    .mic-btn.listening {
      background: linear-gradient(135deg, #ff445f, #c61239);
      animation: pulse 1s infinite;
    }

    .reset-btn {
      background: linear-gradient(135deg, #79c3ff, #5ea7ff);
      box-shadow: 0 10px 24px rgba(94, 167, 255, 0.34);
    }

    .instruction {
      font-size: 0.92rem;
      color: rgba(107, 78, 99, 0.9);
      min-height: 1.25rem;
      font-weight: 500;
    }

    .flame::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 4px;
      transform: translateX(-50%);
      width: 7px;
      height: 11px;
      border-radius: 50% 50% 45% 45%;
      background: radial-gradient(circle at 50% 35%, #ffffff, #fff7d8 72%, rgba(255, 255, 255, 0));
    }

    @keyframes cakeBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes flameFlicker {
      0% { transform: translateX(-50%) scale(0.97) rotate(-3deg); }
      100% { transform: translateX(-50%) scale(1.07) rotate(3deg); }
    }

    @keyframes floatDown {
      0% { transform: translateY(-12vh) rotate(0deg); opacity: 0; }
      15% { opacity: 0.85; }
      85% { opacity: 0.85; }
      100% { transform: translateY(115vh) rotate(280deg); opacity: 0; }
    }

    @keyframes confettiFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      12% { opacity: 1; }
      88% { opacity: 1; }
      100% { transform: translateY(112vh) rotate(540deg); opacity: 0; }
    }

    @keyframes smokeRise {
      0% {
        opacity: 0.8;
        transform: translateX(-50%) translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-40px) scale(0.3);
      }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @media (max-width: 560px) {
      .scene {
        min-height: auto;
        grid-template-rows: auto auto auto;
      }
      .cake-wrap {
        height: 360px;
        margin-top: 0.75rem;
      }
      .cake { transform: scale(0.82); transform-origin: center bottom; }
      .title { font-size: clamp(2rem, 11vw, 3rem); }
      .controls {
        margin-top: 6rem;
        padding: 0.85rem 0.9rem 0.95rem;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="particles" aria-hidden="true">
    <span class="dot d1"></span>
    <span class="dot d2"></span>
    <span class="dot d3"></span>
    <span class="dot d4"></span>
    <span class="dot d5"></span>
    <span class="dot d6"></span>
    <span class="dot d7"></span>
    <span class="dot d8"></span>
  </div>

  <div class="falling-elements" id="fallingElements" aria-hidden="true"></div>

  <main class="scene">
    <h1 class="title">Happy Birthday</h1>
    <p class="subtitle">Dileklerin gercek olsun.</p>

    <section class="cake-wrap" aria-label="Three layer birthday cake">
      <div class="cake-shadow"></div>

      <div class="cake">
        <div class="plate"></div>

        <div class="tier tier-bottom"></div>
        <div class="cream cream-bottom"></div>
        <div class="drips drips-bottom"><span></span><span></span><span></span><span></span><span></span></div>

        <div class="tier tier-middle"></div>
        <div class="cream cream-middle"></div>
        <div class="drips drips-middle"><span></span><span></span><span></span><span></span><span></span></div>

        <div class="tier tier-top"></div>
        <div class="cream cream-top"></div>
        <div class="drips drips-top"><span></span><span></span><span></span><span></span></div>

        <div class="candles">
          <span class="candle"><span class="flame"></span></span>
          <span class="candle"><span class="flame"></span></span>
          <span class="candle"><span class="flame"></span></span>
          <span class="candle"><span class="flame"></span></span>
          <span class="candle"><span class="flame"></span></span>
        </div>
      </div>
    </section>

    <section class="controls" aria-label="Mum kontrol">
      <div class="control-row">
        <button class="icon-btn mic-btn" id="micButton" onclick="toggleMicrophone()" aria-label="Mikrofonu ac">🎤</button>
        <button class="icon-btn reset-btn" id="resetButton" onclick="resetPage()" aria-label="Sifirla" style="display:none;">↺</button>
      </div>
      <p class="instruction" id="micInstruction">Mikrofona dogru ufle ve mumlari sondur.</p>
    </section>
  </main>

  <script>
    let isListening = false;
    let candlesBlown = false;
    let confettiInterval = null;
    let audioContext;
    let analyser;
    let dataArray;
    let micStream;
    const birthdayAudio = new Audio('./sound.mp3');

    const micButton = document.getElementById('micButton');
    const resetButton = document.getElementById('resetButton');
    const micInstruction = document.getElementById('micInstruction');
    const fallingElements = document.getElementById('fallingElements');

    function createFallingElement() {
      if (Math.random() > 0.5) {
        const heart = document.createElement('div');
        heart.className = 'falling-heart';
        heart.textContent = Math.random() > 0.5 ? '❤' : '✨';
        heart.style.left = `${Math.random() * 100}%`;
        heart.style.animationDuration = `${2.7 + Math.random() * 2.1}s`;
        fallingElements.appendChild(heart);
        setTimeout(() => heart.remove(), 5200);
        return;
      }

      const confetti = document.createElement('div');
      const type = Math.floor(Math.random() * 5) + 1;
      confetti.className = `falling-confetti confetti-${type}`;
      confetti.style.left = `${Math.random() * 100}%`;
      confetti.style.animationDuration = `${2.2 + Math.random() * 1.8}s`;
      confetti.style.transform = `rotate(${Math.random() * 180}deg)`;
      fallingElements.appendChild(confetti);
      setTimeout(() => confetti.remove(), 5000);
    }

    function startCelebrationRain() {
      if (confettiInterval) clearInterval(confettiInterval);
      confettiInterval = setInterval(() => {
        if (!candlesBlown) {
          clearInterval(confettiInterval);
          confettiInterval = null;
          return;
        }
        for (let i = 0; i < 5; i += 1) {
          setTimeout(createFallingElement, i * 120);
        }
      }, 1600);
    }

    function stopListening() {
      isListening = false;
      micButton.classList.remove('listening');
      micButton.textContent = '🎤';

      if (!candlesBlown) {
        micInstruction.textContent = 'Mikrofona dogru ufle ve mumlari sondur.';
      }

      if (micStream) {
        micStream.getTracks().forEach((track) => track.stop());
        micStream = null;
      }

      if (audioContext && audioContext.state !== 'closed') {
        audioContext.close();
      }
    }

    function blowCandles() {
      if (candlesBlown) return;

      const flames = document.querySelectorAll('.flame');
      flames.forEach((flame, index) => {
        setTimeout(() => {
          flame.classList.add('blown-out');
          const smoke = document.createElement('div');
          smoke.className = 'smoke';
          flame.parentElement.appendChild(smoke);
          setTimeout(() => smoke.remove(), 1700);
        }, index * 170);
      });

      setTimeout(() => {
        candlesBlown = true;
        stopListening();
        micButton.style.display = 'none';
        resetButton.style.display = 'inline-grid';
        micInstruction.textContent = 'Harika! Dilek tuttun, kutlama basladi.';
        fallingElements.style.opacity = '1';

        for (let i = 0; i < 56; i += 1) {
          setTimeout(createFallingElement, i * 32);
        }

        startCelebrationRain();

        birthdayAudio.currentTime = 0;
        birthdayAudio.volume = 1;
        birthdayAudio.play().catch(() => {});
      }, flames.length * 170 + 240);
    }

    function monitorAudioLevel() {
      if (!isListening || !analyser) return;

      analyser.getByteFrequencyData(dataArray);
      let sum = 0;
      for (let i = 0; i < dataArray.length; i += 1) {
        sum += dataArray[i];
      }
      const average = sum / dataArray.length;

      if (average > 82 && !candlesBlown) {
        blowCandles();
      } else if (average > 48 && !candlesBlown) {
        micInstruction.textContent = 'Biraz daha guclu ufle.';
      }

      requestAnimationFrame(monitorAudioLevel);
    }

    async function toggleMicrophone() {
      if (candlesBlown) return;

      if (!isListening) {
        try {
          micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioContext.createAnalyser();
          const microphone = audioContext.createMediaStreamSource(micStream);
          microphone.connect(analyser);
          analyser.fftSize = 256;
          dataArray = new Uint8Array(analyser.frequencyBinCount);

          isListening = true;
          micButton.classList.add('listening');
          micButton.textContent = '🔴';
          micInstruction.textContent = 'Hazir. Simdi guclu bir nefes ver.';

          monitorAudioLevel();
        } catch (error) {
          micInstruction.textContent = 'Mikrofon izni olmadan mumlar sonmez.';
        }
      } else {
        stopListening();
      }
    }

    function resetPage() {
      candlesBlown = false;
      stopListening();

      const flames = document.querySelectorAll('.flame');
      flames.forEach((flame) => flame.classList.remove('blown-out'));

      if (confettiInterval) {
        clearInterval(confettiInterval);
        confettiInterval = null;
      }

      fallingElements.style.opacity = '0';
      setTimeout(() => {
        fallingElements.innerHTML = '';
      }, 450);

      birthdayAudio.pause();
      birthdayAudio.currentTime = 0;

      micButton.style.display = 'inline-grid';
      resetButton.style.display = 'none';
      micInstruction.textContent = 'Mikrofona dogru ufle ve mumlari sondur.';
    }
  </script>
</body>
</html>
